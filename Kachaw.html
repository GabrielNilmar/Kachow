        width: 100px;
        top: 200px;
        left: 200px;
        z-index: 2;
      }

      .projetil {
        position: absolute;
        width: 30px;
        height: 30px;
      }

      .parede {
        position: absolute;
        background: gray;
      }

        position: fixed;
        top: 10px;
        left: 10px;
      }

      #gameover {
        position: fixed;
        top: 0;
        left: 0;

        height: 100%;
        background: rgba(0,0,0,0.9);
        display: none;
        justify-content: center;
        align-items: center;
        flex-direction: column;
      }

      #gameover img {
        width: 200px;
      }

      #gameover button {
        margin-top: 20px;
        padding: 10px 20px;
        font-size: 18px;
      }
    </style>

      <button onclick="location.reload()">Reiniciar</button>
    </div>

    <img id="personagem" src="Images/S.jpeg">

    <script>
      const personagem = document.getElementById("personagem");

      let x = 200;
      let y = 200;

      let velocidade = 4;
      let velocidadeBase = 4;
      let velocidadeBoost = 8;

      let pontos = 0;
      let nivelVelocidade = 1;
      let jogoAtivo = true;

      const teclas = {};
      const projeteis = [];
      const paredes = [];

      document.addEventListener("keydown", e => teclas[e.key.toLowerCase()] = true);
      document.addEventListener("keyup", e => teclas[e.key.toLowerCase()] = false);

      function mover() {
        if (!jogoAtivo) return;

        // BOOST COM ESPAÇO
        if (teclas[" "]) {
          velocidade = velocidadeBoost;
        } else {
          velocidade = velocidadeBase;
        }

        if (teclas["w"] && teclas["d"]) {
          y -= velocidade; x += velocidade;
          personagem.src = "Images/WD.jpeg";
        } 
        else if (teclas["w"] && teclas["a"]) {
          y -= velocidade; x -= velocidade;
          personagem.src = "Images/WA.jpeg";
        } 
        else if (teclas["s"] && teclas["d"]) {
          y += velocidade; x += velocidade;
          personagem.src = "Images/SD.jpeg";
        } 
        else if (teclas["s"] && teclas["a"]) {
          y += velocidade; x -= velocidade;
          personagem.src = "Images/SA.jpeg";
        } 
        else if (teclas["w"]) {
          y -= velocidade;
          personagem.src = "Images/W.jpeg";
        } 
        else if (teclas["s"]) {
          y += velocidade;
          personagem.src = "Images/S.jpeg";
        } 
        else if (teclas["a"]) {
          x -= velocidade;
          personagem.src = "Images/A.jpeg";
        } 
        else if (teclas["d"]) {
          x += velocidade;
          personagem.src = "Images/D.jpeg";
        }

        personagem.style.top = y + "px";
        personagem.style.left = x + "px";

        requestAnimationFrame(mover);
      }
      mover();

      function criarProjetil() {
        if (!jogoAtivo) return;

        const proj = document.createElement("img");
        proj.src = "Images/pneu.jpg";
        proj.classList.add("projetil");

        let lado = Math.floor(Math.random() * 4);
        let px, py, dx = 0, dy = 0;
        let vel = 6 + nivelVelocidade;

        if (lado === 0) { px = Math.random()*innerWidth; py = 0; dy = vel; }
        else if (lado === 1) { px = Math.random()*innerWidth; py = innerHeight; dy = -vel; }
        else if (lado === 2) { px = 0; py = Math.random()*innerHeight; dx = vel; }
        else { px = innerWidth; py = Math.random()*innerHeight; dx = -vel; }

        proj.style.left = px + "px";
        proj.style.top = py + "px";

        document.body.appendChild(proj);
        projeteis.push({ el: proj, dx, dy });
      }

      setInterval(criarProjetil, 800);

      function colidiu(a, b) {
        const r1 = a.getBoundingClientRect();
        const r2 = b.getBoundingClientRect();

        return !(
          r2.left > r1.right ||
          r2.right < r1.left ||
          r2.top > r1.bottom ||
          r2.bottom < r1.top
        );
      }

      function moverProjeteis() {
        if (!jogoAtivo) return;

        projeteis.forEach(p => {
          let px = parseFloat(p.el.style.left);
          let py = parseFloat(p.el.style.top);

          px += p.dx;
          py += p.dy;

          p.el.style.left = px + "px";
          p.el.style.top = py + "px";

          paredes.forEach(parede => {
            if (colidiu(p.el, parede)) {
              p.dx *= -1;
              p.dy *= -1;
            }
          });

          if (colidiu(p.el, personagem)) {
            gameOver();
          }
        });

        requestAnimationFrame(moverProjeteis);
      }
      moverProjeteis();

      function gameOver() {
        jogoAtivo = false;
        document.getElementById("gameover").style.display = "flex";
      }

      setInterval(() => {
        if (!jogoAtivo) return;
        pontos++;
        document.getElementById("pontos").innerText = pontos;
      }, 1000);

      setInterval(() => {
        if (!jogoAtivo) return;
        nivelVelocidade++;
        document.getElementById("velocidade").innerText = nivelVelocidade;
      }, 2000);

      function criarParede() {
        if (!jogoAtivo) return;

        const parede = document.createElement("div");
        parede.classList.add("parede");

        if (Math.random() > 0.5) {
          parede.style.width = "350px";
          parede.style.height = "70px";
        } else {
          parede.style.width = "70px";
          parede.style.height = "350px";
        }

        parede.style.left = Math.random() * innerWidth + "px";
        parede.style.top = Math.random() * innerHeight + "px";

        document.body.appendChild(parede);
        paredes.push(parede);

        setTimeout(() => {
          parede.remove();
          paredes.splice(paredes.indexOf(parede), 1);
        }, 3000);
      }

      setInterval(criarParede, 2000);

  // =======================
  // BOSS PULANDO (CORRIGIDO)
  // =======================

  let bossPulo = null;
  let bossPuloAtivo = false;
  let bossPuloY = -150;
  let bossPuloX = 300;
  let velocidadeY = 0;
  let gravidade = 1.2;
  let forcaPulo = -20;

  function spawnBossPulo() {
    if (bossPuloAtivo || !jogoAtivo) return;

    bossPulo = document.createElement("img");
    bossPulo.src = "images/gordo.jpg";
    bossPulo.style.position = "absolute";
    bossPulo.style.width = "200px";
    bossPulo.style.left = bossPuloX + "px";
    bossPulo.style.top = bossPuloY + "px";
    bossPulo.style.zIndex = "5";

    document.body.appendChild(bossPulo);
    bossPuloAtivo = true;

    let velocidadeX = 0; // adiciona isso junto das outras variáveis do boss

function pularBoss() {
  if (!bossPuloAtivo || !jogoAtivo) return;

  // GRAVIDADE
  velocidadeY += gravidade;
  bossPuloY += velocidadeY;
  bossPuloX += velocidadeX;

  let chao = window.innerHeight - 150;

  // bater nas paredes laterais
  if (bossPuloX <= 0 || bossPuloX + 150 >= window.innerWidth) {
    velocidadeX *= -1;
  }

  // QUANDO ATINGE O CHÃO
  if (bossPuloY >= chao) {
    bossPuloY = chao;
    velocidadeY = forcaPulo;

    // NOVA DIREÇÃO ALEATÓRIA (pulo em todas direções)
    velocidadeX = (Math.random() - 0.5) * 20;

    tremerTela();
  }

  bossPulo.style.top = bossPuloY + "px";
  bossPulo.style.left = bossPuloX + "px";

  // colisão com player
  if (colidiu(bossPulo, personagem)) {
    gameOver();
  }

  requestAnimationFrame(pularBoss);
}

    // colisão com player
    if (colidiu(bossPulo, personagem)) {
      gameOver();
    }

    requestAnimationFrame(pularBoss);
  }

  // TREMER TELA (seguro)
  function tremerTela() {
    let intensidade = 8;
    let duracao = 200;
    let inicio = Date.now();

    function shake() {
      if (!jogoAtivo) {
        document.body.style.transform = "translate(0,0)";
        return;
      }

      let tempo = Date.now() - inicio;

      if (tempo < duracao) {
        let x = (Math.random() - 0.5) * intensidade;
        let y = (Math.random() - 0.5) * intensidade;

        document.body.style.transform = `translate(${x}px, ${y}px)`;
        requestAnimationFrame(shake);
      } else {
        document.body.style.transform = "translate(0,0)";
      }
    }

    shake();
  }

  // spawn separado (não conflita com outro boss)
  setTimeout(spawnBossPulo, 5000);
  // =======================
// BOSS ESTILO UNDERTALE (RESTAURADO)
// =======================

let boss = null;
let bossAtivo = false;
let bossProjeteis = [];

function spawnBoss() {
  if (bossAtivo || !jogoAtivo) return;

  boss = document.createElement("img");
  boss.src = "images/monteiro.jpg";
  boss.style.position = "absolute";
  boss.style.width = "100px";
  boss.style.top = "50px";
  boss.style.left = "50px";
  boss.style.zIndex = "4";

  document.body.appendChild(boss);
  bossAtivo = true;

  moverBoss();
  atacarBoss();
}

// MOVIMENTO DO BOSS
function moverBoss() {
  if (!bossAtivo || !jogoAtivo) return;

  let bx = parseFloat(boss.style.left);
  let by = parseFloat(boss.style.top);

  if (bx < x) bx += 2;
  if (bx > x) bx -= 2;
  if (by < y) by += 2;
  if (by > y) by -= 2;

  boss.style.left = bx + "px";
  boss.style.top = by + "px";

  if (colidiu(boss, personagem)) {
    gameOver();
  }

  requestAnimationFrame(moverBoss);
}

// ATAQUES DO BOSS
function atacarBoss() {
  if (!bossAtivo || !jogoAtivo) return;

  const proj = document.createElement("div");
  proj.style.position = "absolute";
  proj.style.width = "20px";
  proj.style.height = "20px";
  proj.style.background = "white";
  proj.style.borderRadius = "50%";

  let bx = parseFloat(boss.style.left) + 75;
  let by = parseFloat(boss.style.top) + 75;

  proj.style.left = bx + "px";
  proj.style.top = by + "px";

  let dx = x - bx;
  let dy = y - by;
  let dist = Math.sqrt(dx*dx + dy*dy);

  dx = (dx / dist) * 6;
  dy = (dy / dist) * 6;

  document.body.appendChild(proj);
  bossProjeteis.push({ el: proj, dx, dy });

  setTimeout(atacarBoss, 500);
}

// MOVIMENTO DOS TIROS
function moverProjeteisBoss() {
  if (!bossAtivo || !jogoAtivo) return;

  bossProjeteis.forEach(p => {
    let px = parseFloat(p.el.style.left);
    let py = parseFloat(p.el.style.top);

    px += p.dx;
    py += p.dy;

    p.el.style.left = px + "px";
    p.el.style.top = py + "px";

    if (colidiu(p.el, personagem)) {
      gameOver();
    }
  });

  requestAnimationFrame(moverProjeteisBoss);
}

moverProjeteisBoss();

// SPAWN DO BOSS
setTimeout(spawnBoss, 10000);
